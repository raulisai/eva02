version: "3.9"

services:
  postgres:
    image: supabase/postgres:15.1.1.78
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: eva
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/00-init.sql
      - ./supabase/migrations:/docker-entrypoint-initdb.d/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  eva-core:
    build:
      context: ./apps/eva-core
      dockerfile: Dockerfile
    env_file:
      - ./apps/eva-core/.env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/eva
      - REDIS_URL=redis://redis:6379
    ports:
      - "3000:3000"
    volumes:
      # Monta el socket Docker del host para que EVA pueda lanzar contenedores sandbox.
      # Requiere que el usuario pertenezca al grupo "docker" en el host.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eva-sandbox-builder:
        condition: service_completed_successfully

  # Construye la imagen eva-sandbox antes de que arranque eva-core.
  # Si la imagen ya existe, "docker build --cache-from" es casi inmediato.
  eva-sandbox-builder:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/sandbox:/sandbox
    command: docker build -t eva-sandbox:latest /sandbox
    restart: "no"

volumes:
  postgres_data:
  redis_data:
